name: Cultivate CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    name: 🧪 Automated Testing & Production Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cultivate
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚡ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🗄️ Initialize database schema
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/cultivate
        run: bun run db:init

      - name: 🧪 Run Vitest test suite
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/cultivate
          JWT_SECRET: ci_test_jwt_secret_32bytes_minimum_key
        run: bun run test

      - name: 🏗️ Verify Next.js production build
        run: bun run build

  deploy-to-coolify:
    name: 🚀 Deploy to Coolify
    needs: test-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: 📡 Trigger Coolify Application Deployment
        env:
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
        run: |
          if [ -n "$COOLIFY_DEPLOY_WEBHOOK" ]; then
            echo "Triggering Coolify deployment..."
            curl -X GET "$COOLIFY_DEPLOY_WEBHOOK"
          else
            echo "COOLIFY_DEPLOY_WEBHOOK secret not set. Skipping deployment trigger."
          fi
